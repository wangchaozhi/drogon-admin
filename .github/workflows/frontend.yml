name: frontend

on:
  # 推送 tag（如 v1.2.3）时自动构建前端并把压缩包发布到 GitHub Release
  push:
    tags:
      - "v*"
  # 保留 PR 质量门：面向 main 的 PR 涉及前端相关路径时仍自动验证构建
  pull_request:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/frontend.yml"
  # main 分支的构建全部改为手动触发
  workflow_dispatch:

# tag 触发时需要写仓库内容以创建 Release 并上传资产
permissions:
  contents: write

jobs:
  build:
    name: Lint & Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      # 让 actions/checkout、actions/setup-node 等 JS Action 强制运行在 Node 24 上，
      # 消除 GitHub 关于 Node 20 Actions 的弃用警告。
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: front
    strategy:
      fail-fast: false
      matrix:
        node: ["24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        # 说明：lockfile 在 Windows 生成时不包含 Linux 专用的 optional 依赖
        # （如 @emnapi/core、@emnapi/runtime），导致 `npm ci` 因不同步而失败。
        # 这里改用 `npm install`，并通过 --prefer-offline 最大化利用缓存。
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload dist artifact (workflow artifact)
        if: matrix.node == '24'
        uses: actions/upload-artifact@v4
        with:
          name: front-dist
          path: front/dist
          if-no-files-found: error
          retention-days: 7

      # ---------- 以下仅在 tag 触发时执行：打包并上传到 Release ----------
      - name: Package release asset
        if: startsWith(github.ref, 'refs/tags/')
        # 覆盖 defaults.run.working-directory 为仓库根，避免 front 下相对路径混乱
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          asset="c_web-front-${{ github.ref_name }}.zip"
          (cd front/dist && zip -r "$GITHUB_WORKSPACE/$asset" .)
          echo "ASSET_PATH=$asset" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
