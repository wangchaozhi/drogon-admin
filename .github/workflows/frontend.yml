name: frontend

on:
  # 推送 tag（如 v1.2.3）时自动构建前端并把压缩包发布到 GitHub Release
  push:
    tags:
      - "v*"
  # 保留 PR 质量门：面向 main 的 PR 涉及前端相关路径时仍自动验证构建
  pull_request:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/frontend.yml"
  # main 分支的构建全部改为手动触发；可选填写 tag 在本次运行内直接创建并发布 Release
  workflow_dispatch:
    inputs:
      tag:
        description: "要创建并发布的 tag（留空则只构建不发版，例如 v0.1.0）"
        required: false
        default: ""
      prerelease:
        description: "是否标记为 pre-release（留空则按 tag 中是否含 `-` 自动判断）"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"

# tag 触发 / dispatch 建 tag 均需要写仓库内容以创建 Release 并上传资产
permissions:
  contents: write

jobs:
  # ---------- 手动触发且填写了 tag 时，先在仓库上创建并推送该 tag ----------
  prepare:
    name: Create tag (manual dispatch)
    if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG='${{ inputs.tag }}'
          if ! [[ "$TAG" =~ ^v ]]; then
            echo "::error::tag 必须以 v 开头，例如 v0.1.0，当前输入: $TAG"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::tag $TAG 已存在，请改用新的版本号"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::已创建并推送 tag $TAG"

  build:
    needs: [prepare]
    if: |
      always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    name: Lint & Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      # 让 actions/checkout、actions/setup-node 等 JS Action 强制运行在 Node 24 上，
      # 消除 GitHub 关于 Node 20 Actions 的弃用警告。
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: front
    strategy:
      fail-fast: false
      matrix:
        node: ["24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        # 说明：lockfile 在 Windows 生成时不包含 Linux 专用的 optional 依赖
        # （如 @emnapi/core、@emnapi/runtime），导致 `npm ci` 因不同步而失败。
        # 这里改用 `npm install`，并通过 --prefer-offline 最大化利用缓存。
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload dist artifact (workflow artifact)
        if: matrix.node == '24'
        uses: actions/upload-artifact@v4
        with:
          name: front-dist
          path: front/dist
          if-no-files-found: error
          retention-days: 7

      # ---------- 以下仅在 "发布场景" 时执行：
      #   a) push 了一个 v* tag（tag 触发）
      #   b) workflow_dispatch 且填写了 inputs.tag（已由 prepare job 创建并推送 tag）
      # 统一用 env.RELEASE_TAG 作为真实的 tag 名
      - name: Resolve release tag
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG='${{ inputs.tag }}'
          else
            TAG='${{ github.ref_name }}'
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Package release asset
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        # 覆盖 defaults.run.working-directory 为仓库根，避免 front 下相对路径混乱
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          asset="c_web-front-${RELEASE_TAG}.zip"
          (cd front/dist && zip -r "$GITHUB_WORKSPACE/$asset" .)
          echo "ASSET_PATH=$asset" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ASSET_PATH }}
          fail_on_unmatched_files: true
          draft: false
          # 若手动指定 prerelease 则按指定值；否则按 tag 名含 '-' 自动判断
          prerelease: ${{ inputs.prerelease != '' && inputs.prerelease == 'true' || (inputs.prerelease == '' && contains(env.RELEASE_TAG, '-')) }}
