name: backend

on:
  # 推送 tag（如 v1.2.3）时自动构建三平台产物并发布到 GitHub Release
  push:
    tags:
      - "v*"
  # 保留 PR 质量门：面向 main 的 PR 涉及后端相关路径时仍自动验证构建
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - "triplets/**"
      - "config/**"
      - "sql/**"
      - ".github/workflows/backend.yml"
  # main 分支的构建全部改为手动触发；可选填写 tag 在本次运行内直接创建并发布 Release
  workflow_dispatch:
    inputs:
      tag:
        description: "要创建并发布的 tag（留空则只构建不发版，例如 v0.1.0）"
        required: false
        default: ""
      prerelease:
        description: "是否标记为 pre-release（留空则按 tag 中是否含 `-` 自动判断）"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"

# tag 触发 / dispatch 建 tag 均需要写仓库内容以创建 Release 并上传资产
permissions:
  contents: write

jobs:
  # ---------- 手动触发且填写了 tag 时，先在仓库上创建并推送该 tag ----------
  prepare:
    name: Create tag (manual dispatch)
    if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG='${{ inputs.tag }}'
          if ! [[ "$TAG" =~ ^v ]]; then
            echo "::error::tag 必须以 v 开头，例如 v0.1.0，当前输入: $TAG"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::tag $TAG 已存在，请改用新的版本号"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::已创建并推送 tag $TAG"

  build:
    # 手动填了 tag 时，需要等 prepare 推送完 tag 再进入 checkout（这样 checkout 的是 tag 指向的 commit）；
    # 其他触发事件下 prepare 被 skip，build 仍然照常执行。
    needs: [prepare]
    if: |
      always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # 允许 matrix 中标记为 experimental 的 job 失败而不影响整条流水线（主要用于 arm64-osx，
    # vcpkg 当前 baseline 下 openssl 在该平台存在已知构建问题，等后续升级 baseline 后移除）。
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC (x64, static-md)
            os: windows-2022
            triplet: x64-windows-static-md
            artifact: drogon-admin-windows-x64
            exe_path: build/Release/drogon-admin.exe
            cfg_path: build/Release/config
            sql_path: build/Release/sql
            asset_suffix: windows-x64.zip
            experimental: false
          - name: Ubuntu 22.04 GCC (x64)
            os: ubuntu-22.04
            triplet: x64-linux
            artifact: drogon-admin-ubuntu22-x64
            exe_path: build/drogon-admin
            cfg_path: build/config
            sql_path: build/sql
            asset_suffix: ubuntu22-x64.tar.gz
            experimental: false
          - name: macOS Latest Clang (arm64) [experimental]
            os: macos-latest
            triplet: arm64-osx
            artifact: drogon-admin-macos-arm64
            exe_path: build/drogon-admin
            cfg_path: build/config
            sql_path: build/sql
            asset_suffix: macos-arm64.tar.gz
            experimental: true

    env:
      # 使用 GitHub Actions 自带缓存作为 vcpkg 二进制缓存，避免每次重编 Drogon
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ---------- 平台相关系统依赖 ----------
      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            zip unzip tar curl git \
            autoconf automake libtool \
            libssl-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja pkg-config autoconf automake libtool

      - name: Setup MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ---------- Bootstrap vcpkg（固定到 vcpkg.json 的 builtin-baseline）----------
      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json -Raw | ConvertFrom-Json).'builtin-baseline'
          if (-not $baseline) { throw 'vcpkg.json missing builtin-baseline' }
          Write-Host "Using vcpkg baseline: $baseline"
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          git -C "$env:RUNNER_TEMP\vcpkg" checkout $baseline
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$env:RUNNER_TEMP\vcpkg"            | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          baseline=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          if [ -z "$baseline" ]; then echo "vcpkg.json missing builtin-baseline" >&2; exit 1; fi
          echo "Using vcpkg baseline: $baseline"
          git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          git -C "$RUNNER_TEMP/vcpkg" checkout "$baseline"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/vcpkg"           >> "$GITHUB_PATH"

      # ---------- CMake 配置 ----------
      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake -B build -S . -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} ^
            -DVCPKG_OVERLAY_TRIPLETS=%GITHUB_WORKSPACE%\triplets

      - name: CMake configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DVCPKG_OVERLAY_TRIPLETS="$GITHUB_WORKSPACE/triplets"

      # ---------- 构建 ----------
      - name: CMake build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: cmake --build build --config Release -j

      - name: CMake build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build -j

      # ---------- 产物（所有触发都上传到 workflow artifact，便于 PR/手动下载）----------
      - name: Upload executable (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.exe_path }}
            ${{ matrix.cfg_path }}/**
            ${{ matrix.sql_path }}/**
          if-no-files-found: error
          retention-days: 7

      # ---------- 以下仅在 "发布场景" 时执行：
      #   a) push 了一个 v* tag（tag 触发）
      #   b) workflow_dispatch 且填写了 inputs.tag（已由 prepare job 创建并推送 tag）
      # 统一用 env.RELEASE_TAG 作为真实的 tag 名
      - name: Resolve release tag
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG='${{ inputs.tag }}'
          else
            TAG='${{ github.ref_name }}'
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Package release asset (Windows)
        if: runner.os == 'Windows' && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
        shell: pwsh
        run: |
          $asset = "drogon-admin-$env:RELEASE_TAG-${{ matrix.asset_suffix }}"
          $staging = "release-stage"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "${{ matrix.exe_path }}" "$staging/"
          Copy-Item "${{ matrix.cfg_path }}" "$staging/" -Recurse
          Copy-Item "${{ matrix.sql_path }}" "$staging/" -Recurse
          Compress-Archive -Path "$staging/*" -DestinationPath $asset -Force
          "ASSET_PATH=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package release asset (Unix)
        if: runner.os != 'Windows' && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != ''))
        shell: bash
        run: |
          asset="drogon-admin-${RELEASE_TAG}-${{ matrix.asset_suffix }}"
          staging="release-stage"
          mkdir -p "$staging"
          cp "${{ matrix.exe_path }}" "$staging/"
          cp -R "${{ matrix.cfg_path }}" "$staging/"
          cp -R "${{ matrix.sql_path }}" "$staging/"
          tar -czf "$asset" -C "$staging" .
          echo "ASSET_PATH=$asset" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ASSET_PATH }}
          fail_on_unmatched_files: true
          draft: false
          # 若手动指定 prerelease 则按指定值；否则按 tag 名含 '-' 自动判断
          prerelease: ${{ inputs.prerelease != '' && inputs.prerelease == 'true' || (inputs.prerelease == '' && contains(env.RELEASE_TAG, '-')) }}
