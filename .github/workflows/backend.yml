name: backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - "config/**"
      - "sql/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "CMakeLists.txt"
      - "vcpkg.json"
      - "config/**"
      - "sql/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # 允许 matrix 中标记为 experimental 的 job 失败而不影响整条流水线（主要用于 arm64-osx，
    # vcpkg 当前 baseline 下 openssl 在该平台存在已知构建问题，等后续升级 baseline 后移除）。
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC (x64, static-md)
            os: windows-2022
            triplet: x64-windows-static-md
            artifact: c_web-windows-x64
            exe_path: build/Release/c_web.exe
            cfg_path: build/Release/config
            sql_path: build/Release/sql
            experimental: false
          - name: Ubuntu 22.04 GCC (x64)
            os: ubuntu-22.04
            triplet: x64-linux
            artifact: c_web-ubuntu22-x64
            exe_path: build/c_web
            cfg_path: build/config
            sql_path: build/sql
            experimental: false
          - name: macOS Latest Clang (arm64) [experimental]
            os: macos-latest
            triplet: arm64-osx
            artifact: c_web-macos-arm64
            exe_path: build/c_web
            cfg_path: build/config
            sql_path: build/sql
            experimental: true

    env:
      # 使用 GitHub Actions 自带缓存作为 vcpkg 二进制缓存，避免每次重编 Drogon
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ---------- 平台相关系统依赖 ----------
      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config \
            zip unzip tar curl git \
            autoconf automake libtool \
            libssl-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja pkg-config autoconf automake libtool

      - name: Setup MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ---------- Bootstrap vcpkg（固定到 vcpkg.json 的 builtin-baseline）----------
      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json -Raw | ConvertFrom-Json).'builtin-baseline'
          if (-not $baseline) { throw 'vcpkg.json missing builtin-baseline' }
          Write-Host "Using vcpkg baseline: $baseline"
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          git -C "$env:RUNNER_TEMP\vcpkg" checkout $baseline
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$env:RUNNER_TEMP\vcpkg"            | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          baseline=$(python3 -c "import json; print(json.load(open('vcpkg.json'))['builtin-baseline'])")
          if [ -z "$baseline" ]; then echo "vcpkg.json missing builtin-baseline" >&2; exit 1; fi
          echo "Using vcpkg baseline: $baseline"
          git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          git -C "$RUNNER_TEMP/vcpkg" checkout "$baseline"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/vcpkg"           >> "$GITHUB_PATH"

      # ---------- CMake 配置 ----------
      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake -B build -S . -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} ^
            -DVCPKG_OVERLAY_TRIPLETS=%GITHUB_WORKSPACE%\triplets

      - name: CMake configure (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DVCPKG_OVERLAY_TRIPLETS="$GITHUB_WORKSPACE/triplets"

      # ---------- 构建 ----------
      - name: CMake build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: cmake --build build --config Release -j

      - name: CMake build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build -j

      # ---------- 产物 ----------
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.exe_path }}
            ${{ matrix.cfg_path }}/**
            ${{ matrix.sql_path }}/**
          if-no-files-found: error
          retention-days: 7
